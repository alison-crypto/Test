<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0a84ff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="styles.css" />
  <title>Exercise Library</title>
  <script type="module" src="auth-gate.js"></script>
</head>
<body class="workouts-body theme-alison">

<header class="workouts-header">
  <a href="index.html" class="back-link">‹ Home</a>
  <h1>📚 Exercise Library</h1>
  <div class="workouts-subtitle">~800 exercises · browse by category · tap ＋ to build a custom workout · send it to the Gym tab</div>
</header>

<div id="lib-root">
  <div class="lib-loading">Loading exercise database…</div>
</div>

<footer class="workouts-footer">
  Exercise library · images &amp; data from free-exercise-db (MIT) · videos via YouTube search
</footer>

<script src="library.js" defer></script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('service-worker.js').catch(() => {});
  }
</script>
</body>
</html>
