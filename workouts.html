<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0a84ff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="styles.css" />
  <title>Workouts</title>
</head>
<body>
  <header class="page-header">
    <a href="index.html" class="back-link">‹ Home</a>
    <h1>Workouts</h1>
  </header>

  <section class="stats" id="stats">
    <div class="stat">
      <span class="stat-value" id="stat-total">0</span>
      <span class="stat-label">All time</span>
    </div>
    <div class="stat">
      <span class="stat-value" id="stat-week">0</span>
      <span class="stat-label">This week</span>
    </div>
    <div class="stat">
      <span class="stat-value" id="stat-volume">0</span>
      <span class="stat-label">Volume (wk)</span>
    </div>
  </section>

  <section class="card">
    <h2>Log a set</h2>
    <form id="workout-form" class="form">
      <label>
        Date
        <input type="date" id="f-date" required />
      </label>
      <label>
        Exercise
        <input type="text" id="f-exercise" placeholder="Bench press" required />
      </label>
      <div class="row">
        <label>
          Sets
          <input type="number" id="f-sets" min="1" step="1" value="3" required />
        </label>
        <label>
          Reps
          <input type="number" id="f-reps" min="1" step="1" value="10" required />
        </label>
        <label>
          Weight
          <input type="number" id="f-weight" min="0" step="0.5" placeholder="0" />
        </label>
      </div>
      <label>
        Notes
        <textarea id="f-notes" rows="2" placeholder="Felt strong, easy reps"></textarea>
      </label>
      <button type="submit" class="primary-btn">Save entry</button>
    </form>
  </section>

  <section class="card">
    <div class="card-head">
      <h2>History</h2>
      <button type="button" id="export-btn" class="text-btn">Export</button>
    </div>
    <ul id="entries" class="entries"></ul>
    <p id="empty-state" class="empty">No entries yet — log your first set above.</p>
  </section>

  <script src="app.js"></script>
  <script src="workouts.js"></script>
</body>
</html>
